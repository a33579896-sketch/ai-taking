<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Taking</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: #212121;
    color: #ececec;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 14px 16px;
    background: #171717;
    border-bottom: 1px solid #2f2f2f;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }
  header p {
    margin: 2px 0 0;
    font-size: 12px;
    color: #999;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .row {
    display: flex;
    margin: 14px 0;
  }
  .row.user { justify-content: flex-end; }
  .row.bot { justify-content: flex-start; }
  .msg {
    padding: 12px 16px;
    border-radius: 16px;
    max-width: 78%;
    line-height: 1.7;
    font-size: 16px;
    unicode-bidi: plaintext;
    white-space: pre-wrap;
  }
  .user .msg {
    background: #2f6fed;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .bot .msg {
    background: #2f2f2f;
    color: #ececec;
    border-bottom-left-radius: 4px;
  }
  .dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    margin: 0 2px;
    background: #999;
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  #inputbar {
    display: flex;
    align-items: center;
    padding: 10px;
    background: #171717;
    border-top: 1px solid #2f2f2f;
    gap: 8px;
  }
  #userInput {
    flex: 1;
    padding: 12px 14px;
    border-radius: 24px;
    border: 1px solid #3f3f3f;
    font-size: 16px;
    background: #2a2a2a;
    color: #eee;
    unicode-bidi: plaintext;
  }
  #userInput:focus { outline: none; border-color: #2f6fed; }
  .iconBtn {
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 50%;
    border: none;
    background: #2f2f2f;
    color: #ececec;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .iconBtn.active {
    background: #e02424;
    color: white;
  }
  #sendBtn {
    background: #2f6fed;
    color: white;
  }
</style>
</head>
<body>

<header>
  <h1>🤖 AI Taking</h1>
  <p>Banaya by Abdullah</p>
</header>

<div id="chat"></div>

<div id="inputbar">
  <button class="iconBtn" id="micBtn" title="Bol kar likhein">🎤</button>
  <input type="text" id="userInput" placeholder="Apna message likhein ya bolein..." />
  <button class="iconBtn" id="sendBtn" title="Bhejein">➤</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');

let history = [];

function addMessage(role, text) {
  const row = document.createElement('div');
  row.className = 'row ' + (role === 'user' ? 'user' : 'bot');
  const div = document.createElement('div');
  div.className = 'msg';
  div.textContent = text;
  row.appendChild(div);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  return row;
}

function addLoadingMessage() {
  const row = document.createElement('div');
  row.className = 'row bot';
  row.innerHTML = '<div class="msg dots"><span></span><span></span><span></span></div>';
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  return row;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMessage('user', text);
  inputEl.value = '';
  history.push({role: 'user', content: text});

  const loadingRow = addLoadingMessage();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages: history})
    });
    const data = await res.json();
    loadingRow.remove();
    if (data.error) {
      addMessage('bot', 'Error: ' + data.error);
    } else {
      addMessage('bot', data.reply);
      history.push({role: 'assistant', content: data.reply});
    }
  } catch (e) {
    loadingRow.remove();
    addMessage('bot', 'Connection error: ' + e.message);
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

// ===== Voice Input (Speech to Text) =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = 'ur-PK';
  recognition.interimResults = false;

  let listening = false;

  micBtn.addEventListener('click', () => {
    if (!listening) {
      recognition.start();
      listening = true;
      micBtn.classList.add('active');
    } else {
      recognition.stop();
    }
  });

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    inputEl.value = transcript;
  };

  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove('active');
  };

  recognition.onerror = () => {
    listening = false;
    micBtn.classList.remove('active');
  };
} else {
  micBtn.style.display = 'none';
}

addMessage('bot', 'Salam! Main AI Taking hoon. Aap mujh se kisi bhi zaban mein baat kar saktay hain — type kar ke ya mic dabakar bol kar.');
</script>

</body>
  </html>
